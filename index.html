<!doctype html>
<html lang="ko">
  <head>
    <!-- =========================================================
         1. 기본 문서 설정
         - 문자 인코딩
         - 모바일 viewport
         ========================================================= -->
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />

    <!-- =========================================================
         2. PWA / 모바일 앱 표시 설정
         - iOS 홈 화면 추가
         - 브라우저 테마 컬러
         ========================================================= -->
    <meta name="theme-color" content="#25524a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="비전트립" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <!-- =========================================================
         3. 기본 SEO 설명
         - 검색 결과 및 기본 링크 설명
         ========================================================= -->
    <meta
      name="description"
      content="비전트립 정보를 한 곳에서 확인하는 비전트립 핸드북입니다."
    />

    <!-- =========================================================
         4. Open Graph 공유 미리보기
         - 카카오톡 / 문자 / 디스코드 / 인스타 DM 등
         ========================================================= -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="비전트립 | 이촌동교회 삿포로 비전트립" />
    <meta
      property="og:description"
      content="비전트립 정보를 한 곳에서 확인하는 비전트립 핸드북입니다."
    />
    <meta
      property="og:url"
      content="https://sisis1207.github.io/vision-trip/"
    />
    <meta
      property="og:image"
      content="https://sisis1207.github.io/vision-trip/og-image.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- =========================================================
         5. Twitter/X 공유 미리보기
         ========================================================= -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="비전트립 | 이촌동교회 삿포로 비전트립"
    />
    <meta
      name="twitter:description"
      content="비전트립 정보를 한 곳에서 확인하는 비전트립 핸드북입니다."
    />
    <meta
      name="twitter:image"
      content="https://sisis1207.github.io/vision-trip/og-image.png"
    />

    <!-- =========================================================
         6. 문서 제목 및 정적 리소스
         - manifest
         - favicon
         - CSS
         ========================================================= -->
    <title>비전트립 | 이촌동교회 삿포로 비전트립</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./assets/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./assets/icon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body>
    <!-- =========================================================
         7. 전체 앱 레이아웃 컨테이너
         ========================================================= -->
    <div class="shell">
      <!-- 상단 헤더: 앱 제목과 북마크/설치 안내 버튼 -->
      <header class="topbar">
        <div>
          <p class="eyebrow">Vision Trip</p>
          <h1>비전트립</h1>
        </div>
        <button
          class="icon-button"
          id="installButton"
          type="button"
          title="북마크로 저장"
          aria-label="북마크로 저장"
        >
          <span aria-hidden="true">+</span>
        </button>
      </header>

      <main>
        <!-- =========================================================
             8. 홈 Hero 영역
             - 앱 소개
             - 주요 기능 태그
             - 오늘 일정 카드
             ========================================================= -->
        <section class="hero" id="homeHero" aria-labelledby="heroTitle">
          <div class="hero-inner">
            <div class="hero-copy">
              <p class="label">비전트립 핸드북</p>
              <h2 class="hero-title" id="heroTitle">삿포로</h2>

              <div class="hero-tags">
                <span>안내</span>
                <span>일정</span>
                <span>찬양</span>
                <span>말씀</span>
                <span>메모</span>
                <span>마스코트</span>
              </div>

              <p class="hero-note">
                비전트립에 필요한 정보를 한 곳에서 확인하세요.
              </p>
            </div>

            <div class="hero-illust" aria-hidden="true">
              <img src="./assets/hanmom.png" alt="" />
            </div>
          </div>

          <!-- 오늘 일정 카드: app.js에서 오늘 날짜와 일치하는 일정이 있을 때 표시 -->
          <div
            class="hero-panel today-card"
            id="todayScheduleCard"
            aria-label="오늘 일정"
            hidden
          >
            <div class="today-card-header">
              <div>
                <div class="today-title-row">
                  <img
                    src="./assets/hanmom.png"
                    alt=""
                    class="today-character"
                    aria-hidden="true"
                  />
                  <span>오늘 일정</span>
                </div>
                <p class="today-date" id="todayScheduleDate"></p>
              </div>
              <strong class="today-day-badge" id="todayDayBadge"></strong>
            </div>
            <div class="today-list" id="todayScheduleList"></div>
            <button class="today-toggle" id="todayToggle" type="button">
              더 보기
            </button>
          </div>
        </section>

        <!-- =========================================================
             9. 메인 카테고리 탭
             - 안내 / 일정 / 찬양 / 말씀 / 메모 / 마스코트
             - app.js에서 data-category 값으로 화면 전환
             ========================================================= -->
        <nav class="tabs" id="categoryTabs" aria-label="카테고리">
          <button class="tab active" type="button" data-category="info">
            안내
          </button>
          <button class="tab" type="button" data-category="schedule">
            일정
          </button>
          <button class="tab" type="button" data-category="song">찬양</button>
          <button class="tab" type="button" data-category="word">말씀</button>
          <button class="tab" type="button" data-category="memo">메모</button>
          <button class="tab" type="button" data-category="hanmom">
            마스코트
          </button>
        </nav>

        <!-- 하위 페이지 헤더: 카테고리 또는 가사 페이지 진입 시 표시 -->
        <section class="page-header" id="pageHeader" hidden>
          <button
            class="back-button"
            id="backButton"
            type="button"
            aria-label="뒤로가기"
          >
            <svg class="back-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M15 18L9 12L15 6" />
            </svg>
          </button>
          <div>
            <p class="eyebrow">Vision Trip</p>
            <h2 id="pageTitle">안내</h2>
          </div>
        </section>

        <!-- 말씀 검색 영역: 말씀 카테고리에서만 app.js가 표시 -->
        <section class="word-search" id="wordSearch" hidden>
          <label class="sr-only" for="wordSearchInput">말씀 검색</label>
          <input
            id="wordSearchInput"
            type="search"
            autocomplete="off"
            placeholder="말씀 검색"
          />
        </section>

        <!-- 일정 일차 선택 탭: 일정 카테고리에서만 app.js가 표시 -->
        <nav
          class="schedule-tabs"
          id="scheduleTabs"
          aria-label="일차 선택"
          hidden
        >
          <button class="schedule-tab active" type="button" data-day="day-1">
            1일차
          </button>
          <button class="schedule-tab" type="button" data-day="day-2">
            2일차
          </button>
          <button class="schedule-tab" type="button" data-day="day-3">
            3일차
          </button>
          <button class="schedule-tab" type="button" data-day="day-4">
            4일차
          </button>
          <button class="schedule-tab" type="button" data-day="day-5">
            5일차
          </button>
        </nav>

        <!-- 콘텐츠 목록 출력 영역: 안내 / 일정 / 찬양 / 말씀 / 메모 렌더링 -->
        <section
          class="content-list"
          id="contentList"
          aria-live="polite"
          hidden
        ></section>

        <!-- 설치 안내 시트: 북마크/홈 화면 추가 안내 -->
        <section class="install-sheet" id="installSheet" hidden>
          <div
            class="install-card"
            role="dialog"
            aria-modal="true"
            aria-labelledby="installTitle"
          >
            <button
              class="sheet-close"
              id="closeInstallSheet"
              type="button"
              aria-label="닫기"
            >
              ×
            </button>
            <h2 id="installTitle">북마크로 저장</h2>
            <p id="installMessage">
              브라우저 북마크나 홈 화면에 추가하면 다음부터 바로 열 수 있습니다.
            </p>
          </div>
        </section>

        <!-- 이미지 확대 보기: 찬양 이미지 클릭 시 app.js에서 표시 -->
        <section class="image-viewer" id="imageViewer" hidden>
          <button
            class="image-close"
            id="closeImageViewer"
            type="button"
            aria-label="닫기"
          >
            ×
          </button>
          <img id="viewerImage" src="" alt="" />
        </section>
      </main>
    </div>

    <!-- 앱 동작 스크립트: 화면 전환, 데이터 렌더링, 메모, 이미지 확대, PWA 등록 -->
    <script src="./app.js" type="module"></script>
  </body>
</html>
